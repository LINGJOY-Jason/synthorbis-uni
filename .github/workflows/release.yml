name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: false

env:
  VERSION: ${{ inputs.version }}

jobs:
  # ── 触发全平台构建 ───────────────────────────────
  build-all:
    name: Build All Platforms
    uses: ./.github/workflows/ci.yml
    with:
      version: ${{ env.VERSION }}

  # ── 构建 Release 包 ──────────────────────────────
  package-release:
    name: Package Release
    runs-on: ubuntu-latest
    needs: build-all
    strategy:
      matrix:
        include:
          - platform: windows-x64
            artifact: librime-windows-x64-Release
          - platform: linux-x64-gcc
            artifact: librime-linux-x64-gcc-Release
          - platform: linux-x64-clang
            artifact: librime-linux-x64-clang-Release
          - platform: linux-arm64
            artifact: librime-linux-arm64-Release
          - platform: linux-loongarch64
            artifact: librime-linux-loongarch64-Release
          - platform: macos-universal
            artifact: librime-macos-universal-Release
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Create Release Package
        run: |
          mkdir -p release-${{ matrix.platform }}
          cp -r * release-${{ matrix.platform }}/ 2>/dev/null || true

  # ── 创建 GitHub Release ──────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package-release
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          release_name: SynthOrbis UNI v${{ env.VERSION }}
          draft: true
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 上传所有构建产物 ─────────────────────────────
  upload-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [package-release, create-release]
    strategy:
      matrix:
        include:
          - platform: windows-x64
            artifact: librime-windows-x64-Release
          - platform: linux-x64
            artifact: librime-linux-x64-gcc-Release
          - platform: macos-universal
            artifact: librime-macos-universal-Release
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          file: |
            **/*
          if_no_assets_found: warn
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 通知完成 ─────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [create-release, upload-assets]
    steps:
      - name: Success Notification
        run: |
          echo "## Release v${{ env.VERSION }} Created Successfully!"
          echo "- Draft release created at: https://github.com/${{ github.repository }}/releases"
          echo "- All platform artifacts uploaded"
