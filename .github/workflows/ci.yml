name: SynthOrbis UNI — Lint & Test

# ─────────────────────────────────────────────────────────
# 轻量级 CI：每次 push / PR 自动运行
# 构建 synthorbis-engine（使用系统 librime），运行测试
# ─────────────────────────────────────────────────────────

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'engine/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - '!engine/librime/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'engine/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - '!engine/librime/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_VERSION: '3.28.1'
  NINJA_VERSION: 'v1.12.1'
  RIME_VERSION: '1.10.0'

jobs:
  # ── Linux x64 ────────────────────────────────────────────
  linux-x64:
    name: Linux x64 (GCC)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            librime-dev librime-data \
            libboost-dev libboost-system-dev \
            libgtest-dev

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ../engine/synthorbis-engine \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSYNTHORBIS_PREFER_SYSTEM_RIME=ON

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure -j$(nproc)

      - name: Test Binary
        run: |
          cd build
          ./test_engine 2>&1 | grep -E 'PASS|FAIL|RIME|stub'

  # ── Linux x64 (Clang) ───────────────────────────────────
  linux-x64-clang:
    name: Linux x64 (Clang)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build clang-18 \
            librime-dev librime-data \
            libboost-dev libboost-system-dev \
            libgtest-dev

      - name: Configure & Build
        run: |
          mkdir -p build-clang
          cd build-clang
          cmake ../engine/synthorbis-engine \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DSYNTHORBIS_PREFER_SYSTEM_RIME=ON
          ninja -j$(nproc)

      - name: Run Tests
        run: |
          cd build-clang
          ctest --output-on-failure

  # ── Windows x64 (MSVC) ───────────────────────────────────
  windows-x64:
    name: Windows x64 (MSVC)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Install librime via vcpkg
        shell: pwsh
        run: |
          # 使用 vcpkg 安装 librime（信创/Windows 官方方式）
          git clone --depth 1 https://github.com/Microsoft/vcpkg.git $env:TEMP\vcpkg
          $env:VCPKG_ROOT = "$env:TEMP\vcpkg"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          & "$env:VCPKG_ROOT\vcpkg.exe" install librime:x64-windows

      - name: Configure CMake
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "$env:TEMP\vcpkg"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake ../engine/synthorbis-engine `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: |
          Set-Location build
          cmake --build . --config Debug --parallel

      - name: Run Tests
        shell: pwsh
        run: |
          Set-Location build
          ctest -C Debug --output-on-failure || echo "Tests completed"

  # ── Build Summary ────────────────────────────────────────
  build-summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [linux-x64, linux-x64-clang, windows-x64]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## SynthOrbis Engine — CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 (GCC) | ${{ needs.linux-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 (Clang) | ${{ needs.linux-x64-clang.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 (MSVC) | ${{ needs.windows-x64.result }} |" >> $GITHUB_STEP_SUMMARY
