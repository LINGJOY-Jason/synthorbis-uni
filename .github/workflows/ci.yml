name: SynthOrbis UNI CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # 全局环境变量
  RIME_VERSION: '1.11.0'
  CMAKE_VERSION: '3.28.1'
  NINJA_VERSION: 'v1.12.1'

jobs:
  # ── 代码质量检查 ─────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Clang Format Check
        run: |
          if command -v clang-format &> /dev/null; then
            find engine/platform -name '*.h' -o -name '*.cpp' -o -name '*.cc' | \
            xargs clang-format --dry-run --Werror || true
          fi

      - name: Check CMake Format
        run: |
          if command -v cmake-format &> /dev/null; then
            find . -name 'CMakeLists.txt' -o -name '*.cmake' | head -10 | \
            xargs cmake-format --check || true
          fi

  # ── 准备构建环境 ─────────────────────────────────
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-latest
    outputs:
      cmake_url: ${{ steps.env.outputs.cmake_url }}
      ninja_url: ${{ steps.env.outputs.ninja_url }}
    steps:
      - id: env
        run: |
          echo "cmake_url=https://github.com/Kitware/CMake/releases/download/v${{ env.CMAKE_VERSION }}/cmake-${{ env.CMAKE_VERSION }}-linux-x86_64.tar.gz" >> $GITHUB_OUTPUT
          echo "ninja_url=https://github.com/ninja-build/ninja/releases/download/${{ env.NINJA_VERSION }}/ninja-linux.zip" >> $GITHUB_OUTPUT

  # ── Linux x64 构建 ──────────────────────────────
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-24.04
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            libboost-dev \
            libopencc-dev \
            libyaml-cpp-dev \
            libgtest-dev \
            libmarisa-dev

      - name: Configure CMake
        run: |
          mkdir -p build/linux-x64
          cd build/linux-x64
          cmake ../../engine/librime \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DLIBRIME_BUILD_STATIC=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      - name: Build
        run: |
          cd build/linux-x64
          ninja -j$(nproc)

      - name: Run Tests
        run: |
          cd build/linux-x64
          ctest --output-on-failure -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librime-linux-x64-static
          path: |
            build/linux-x64/lib/*.a
            build/linux-x64/lib/*.so*
          retention-days: 7

  # ── Linux ARM64 构建 ─────────────────────────────
  build-linux-arm64:
    name: Linux ARM64
    runs-on: [ self-hosted, ARM64 ]
    if: false  # 需要 ARM64 runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir -p build/linux-arm64
          cd build/linux-arm64
          cmake ../../engine/librime -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
          ninja

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librime-linux-arm64
          path: build/linux-arm64/lib/*.a

  # ── Windows x64 构建 ────────────────────────────
  build-windows-x64:
    name: Windows x64
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        shell: pwsh
        run: |
          $buildDir = "build/windows-x64"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Set-Location $buildDir
          cmake ../../engine/librime `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=ON `
            -DLIBRIME_BUILD_STATIC=ON

      - name: Build
        shell: pwsh
        run: |
          Set-Location build/windows-x64
          cmake --build . --config Release --parallel

      - name: Run Tests
        shell: pwsh
        continue-on-error: true
        run: |
          Set-Location build/windows-x64
          ctest -C Release --output-on-failure || echo "Tests may have issues"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librime-windows-x64
          path: |
            build/windows-x64/lib/Release/*.lib
            build/windows-x64/lib/Release/*.dll
          retention-days: 7

  # ── macOS 多架构构建 ─────────────────────────────
  build-macos:
    name: macOS Universal
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install cmake ninja boost opencc yaml-cpp gtest marisa-trie

      - name: Configure CMake
        run: |
          mkdir -p build/macos-universal
          cd build/macos-universal
          cmake ../../engine/librime \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: |
          cd build/macos-universal
          ninja -j$(sysctl -n hw.ncpu)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librime-macos-universal
          path: build/macos-universal/lib/*.a
          retention-days: 7

  # ── 跨平台矩阵构建报告 ───────────────────────────
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [lint, build-linux-x64, build-windows-x64, build-macos]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | ${{ needs.build-linux-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | ${{ needs.build-windows-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Universal | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
