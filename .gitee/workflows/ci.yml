# =============================================
# SynthOrbis UNI — Gitee Go CI/CD 流水线
# 触发：push 到 master / PR
# 说明：Gitee Go 使用 stages + jobs 结构
# =============================================

# ── 流水线标识 ────────────────────────────────
gitee_cd_yaml: true

# ── 阶段定义（按顺序执行）─────────────────────
stages:
  - compile_linux_x64
  - compile_linux_arm64
  - compile_linux_loongarch
  - build_docker_images

# ── Job 1：Linux x64 编译 ──────────────────────
build_linux_x64:
  stage: compile_linux_x64
  image: ubuntu:22.04
  parallel:
    runners:
      - labels: [ubuntu-latest]
  script:
    - apt-get update && apt-get install -y build-essential cmake ninja-build git
    - apt-get install -y libboost-dev libboost-filesystem-dev libboost-system-dev
    - apt-get install -y libopencc-dev libmarisa-dev libyaml-cpp-dev libxkbfile-dev
    - cd engine/librime && mkdir -p build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
    - cmake --build . --config Release --parallel
    - ctest -C Release --output-on-failure
  artifacts:
    paths:
      - engine/librime/build/librime*.so
      - engine/librime/build/librime*.a
    expire_in: 7 days
  allow_failure: false

# ── Job 2：Linux ARM64 交叉编译 ──────────────
build_linux_arm64:
  stage: compile_linux_arm64
  image: ubuntu:22.04
  parallel:
    runners:
      - labels: [ubuntu-latest]
  script:
    - apt-get update && apt-get install -y cmake ninja-build git gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
    - cd engine/librime && mkdir -p build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
      -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
      -DCMAKE_CROSSCOMPILING=ON
      -DCMAKE_SYSTEM_NAME=Linux
      -DCMAKE_SYSTEM_PROCESSOR=aarch64
    - cmake --build . --config Release --parallel
  allow_failure: true

# ── Job 3：Linux LoongArch 交叉编译 ───────────
build_linux_loongarch:
  stage: compile_linux_loongarch
  image: ubuntu:22.04
  script:
    - echo "LoongArch toolchain download skipped in CI (manual cross-compile required)"
    - echo "Target: loongarch64-linux-gnu-gcc"
  allow_failure: true

# ── Job 4：构建 Docker 镜像（需先配置容器Registry）───
docker_images:
  stage: build_docker_images
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $GITEE_USERNAME -p $GITEE_PASSWORD registry.gitee.com
    - docker build -t registry.gitee.com/HengYuanXiangJunJunJun/synthorbis-uni/linux-x64:latest docker/linux-x64
    - docker push registry.gitee.com/HengYuanXiangJunJunJun/synthorbis-uni/linux-x64:latest
  only:
    - master
  allow_failure: true

# ── 触发条件 ───────────────────────────────────
triggers:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
