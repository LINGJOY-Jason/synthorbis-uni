# =============================================
# Gitee Go CI/CD Pipeline — SynthOrbis UNI
# =============================================
# Gitee 平台专用流水线配置
# 使用 Gitee Go (gitee-actions) 执行
#
# 触发条件:
#   - push 到 main/develop 分支
#   - pull request
#   - 手动触发
#
# 注意: Gitee Go 使用不同的语法和 runner 配置
# =============================================

name: SynthOrbis UNI CI/CD

displayName:
  zh-CN: SynthOrbis UNI 持续集成
  en-US: SynthOrbis UNI CI/CD

triggers:
  push:
    branches:
      - main
      - develop
    paths:
      exclude:
        - docs/**
        - '**.md'
        - LICENSE
  pull_request:
    branches:
      - main
  tag:
    pattern: v*

stages:
  - stage: lint
    name: Code Quality
    job: lint
    triggers:
      - push
      - pull_request
    steps:
      - name: Checkout Code
        uses: checkout@v4

      - name: Install Lint Tools
        run: |
          apt-get update
          apt-get install -y clang-format cmake

      - name: Run Lint
        run: |
          echo "Running code quality checks..."
          find engine/platform -name '*.h' -o -name '*.cpp' 2>/dev/null | head -20 || true

  - stage: build_linux
    name: Linux Build
    parallel: true
    jobs:
      - job: build_linux_x64
        name: Linux x64 GCC
        runner: gitee-runner:ubuntu-24.04
        steps:
          - name: Checkout
            uses: checkout@v4
            with:
              submodules: true

          - name: Install Dependencies
            run: |
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build \
                libboost-dev libboost-system-dev libboost-filesystem-dev \
                libopencc-dev libyaml-cpp-dev libgtest-dev \
                libmarisa-dev

          - name: Configure
            run: |
              mkdir -p build/linux-x64
              cd build/linux-x64
              cmake ../../engine/librime \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=ON \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON

          - name: Build
            run: |
              cd build/linux-x64
              ninja -j$(nproc)

          - name: Test
            run: |
              cd build/linux-x64
              ctest --output-on-failure -j$(nproc) || true

          - name: Upload Artifacts
            uses: upload-artifact@v3
            with:
              name: librime-linux-x64
              path: build/linux-x64/lib/
              retention-days: 7

      - job: build_linux_arm64
        name: Linux ARM64 Cross-Compile
        runner: gitee-runner:ubuntu-24.04
        steps:
          - name: Checkout
            uses: checkout@v4

          - name: Install Cross-Compiler
            run: |
              apt-get update
              apt-get install -y --no-install-recommends \
                cmake ninja-build \
                gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                libboost-dev libyaml-cpp-dev

          - name: Configure
            run: |
              mkdir -p build/linux-arm64
              cd build/linux-arm64
              cmake ../../engine/librime \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
                -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

          - name: Build
            run: |
              cd build/linux-arm64
              ninja -j$(nproc)

          - name: Upload Artifacts
            uses: upload-artifact@v3
            with:
              name: librime-linux-arm64
              path: build/linux-arm64/lib/
              retention-days: 7

  - stage: build_windows
    name: Windows Build
    parallel: true
    jobs:
      - job: build_windows_x64
        name: Windows x64 MSVC
        runner: gitee-runner:windows-2022
        steps:
          - name: Checkout
            uses: checkout@v4
            with:
              submodules: true

          - name: Setup MSVC
            uses: msvc@v2

          - name: Configure
            run: |
              New-Item -ItemType Directory -Force -Path build | Out-Null
              Set-Location build
              cmake ../engine/librime `
                -G "Visual Studio 17 2022" `
                -A x64 `
                -DCMAKE_BUILD_TYPE=Release `
                -DBUILD_TESTING=ON

          - name: Build
            run: |
              Set-Location build
              cmake --build . --config Release --parallel

          - name: Test
            run: |
              Set-Location build
              ctest -C Release --output-on-failure -j4 || true

          - name: Upload Artifacts
            uses: upload-artifact@v3
            with:
              name: librime-windows-x64
              path: build/lib/Release/
              retention-days: 7

  - stage: build_macos
    name: macOS Build
    jobs:
      - job: build_macos_universal
        name: macOS Universal
        runner: gitee-runner:macos-14
        steps:
          - name: Checkout
            uses: checkout@v4
            with:
              submodules: true

          - name: Install Dependencies
            run: |
              brew install cmake ninja boost opencc yaml-cpp
              brew install marisa-trie || true

          - name: Configure
            run: |
              mkdir -p build/macos-universal
              cd build/macos-universal
              cmake ../../engine/librime \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=ON \
                -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

          - name: Build
            run: |
              cd build/macos-universal
              ninja -j$(sysctl -n hw.ncpu)

          - name: Upload Artifacts
            uses: upload-artifact@v3
            with:
              name: librime-macos-universal
              path: build/macos-universal/lib/
              retention-days: 7

  - stage: release
    name: Create Release
    condition: tag matches "v*"
    jobs:
      - job: create_release
        name: Publish Release
        runner: gitee-runner:ubuntu-24.04
        steps:
          - name: Checkout
            uses: checkout@v4

          - name: Download All Artifacts
            uses: download-artifact@v3
            with:
              pattern: librime-*
              path: artifacts/

          - name: Create Release
            uses: release-action@v1
            with:
              tag: ${{ git.ref }}
              title: SynthOrbis UNI ${{ git.ref }}
              note: |
                ## SynthOrbis UNI Release

                This release includes pre-built binaries for:
                - Linux x64 (GCC)
                - Linux ARM64
                - Windows x64 (MSVC)
                - macOS Universal

                ### Supported Platforms
                - Ubuntu 20.04+ / Debian 11+
                - Windows 10/11 (x64)
                - macOS 12+ (Intel & Apple Silicon)

                ### 信创平台支持
                - 统信 UOS V20
                - 麒麟 V10
                - 龙芯 LoongArch64
                - 飞腾/鲲鹏 ARM64

                ### 下一步
                1. 下载对应平台的构建产物
                2. 解压到项目 engine/librime 目录
                3. 参考 docs/BUILD-LINUX-WSL.md 进行集成

# ── 环境变量 ──────────────────────────────────────
env:
  CARGO_HOME: /opt/cargo
  RUSTUP_HOME: /opt/rustup

# ── 缓存配置 ──────────────────────────────────────
cache:
  paths:
    - ~/.ccache
    - build/**/CMakeCache.txt
    - build/**/CMakeFiles

# ── 超时设置 ──────────────────────────────────────
timeout:
  build: 60  # minutes
  test: 30   # minutes
