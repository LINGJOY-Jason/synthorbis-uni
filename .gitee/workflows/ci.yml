# =============================================
# Gitee Go CI/CD Pipeline — SynthOrbis UNI
# =============================================
# Gitee 平台专用流水线配置
# 触发条件:
#   - push 到 main/develop 分支（排除 docs/ 和 *.md）
#   - 手动触发
#
# 注意: Gitee Go 使用与 GitHub Actions 不同的语法:
#   - 使用 git:: 协议进行 checkout
#   - 使用 GITORIS_* 内置变量
#   - 使用 gitee:: 协议上传产物
# =============================================

name: SynthOrbis UNI CI/CD

displayName:
  zh-CN: SynthOrbis UNI 持续集成
  en-US: SynthOrbis UNI CI/CD

triggers:
  push:
    branches:
      - master
      - develop
    paths:
      exclude:
        - 'docs/**'
        - '**.md'
        - 'LICENSE'
  pull_request:
    branches:
      - master
  tag:
    pattern: v*

stages:
  # ── 代码质量检查 ───────────────────────────────────
  - stage: lint
    name: 代码质量检查
    jobs:
      - job: lint
        name: Lint & Format Check
        runner: gitee-runner:ubuntu-24.04
        steps:
          - name: Checkout Code
            command: |
              cd $GITORIS_REPO_LOCAL_DIR
              git submodule update --init --recursive || true

          - name: Install Lint Tools
            command: |
              apt-get update
              apt-get install -y clang-format clang-tidy cmake

          - name: Run Clang Format Check
            command: |
              cd $GITORIS_REPO_LOCAL_DIR
              find engine/synthorbis-engine -name '*.h' -o -name '*.cc' | \
                xargs clang-format --dry-run --Werror 2>/dev/null || true

  # ── Linux 构建 ─────────────────────────────────────
  - stage: build_linux
    name: Linux 构建
    jobs:
      # Linux x64 GCC
      - job: build_linux_x64
        name: Linux x64 GCC
        runner: gitee-runner:ubuntu-24.04
        steps:
          - name: Checkout
            command: |
              cd $GITORIS_REPO_LOCAL_DIR

          - name: Install Dependencies
            command: |
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build \
                librime-dev librime-data \
                libboost-dev libboost-system-dev \
                libyaml-cpp-dev libgtest-dev \
                libmarisa-dev

          - name: Configure CMake
            command: |
              mkdir -p build
              cd build
              cmake ../engine/synthorbis-engine \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DSYNTHORBIS_PREFER_SYSTEM_RIME=ON

          - name: Build
            command: |
              cd build
              ninja -j$(nproc)

          - name: Run Tests
            command: |
              cd build
              ctest --output-on-failure -j$(nproc) || true

          - name: Upload Artifact
            command: |
              cd build
              tar -czf ../synthorbis-engine-$GITORIS_COMMIT_SHA-linux-x64.tar.gz .
              # Gitee Go 自动保存 build/ 目录产物，无需手动上传

      # Linux x64 Clang
      - job: build_linux_x64_clang
        name: Linux x64 Clang
        runner: gitee-runner:ubuntu-24.04
        steps:
          - name: Checkout
            command: |
              cd $GITORIS_REPO_LOCAL_DIR

          - name: Install Dependencies
            command: |
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build clang-18 \
                librime-dev librime-data \
                libboost-dev libboost-system-dev \
                libyaml-cpp-dev libgtest-dev \
                libmarisa-dev

          - name: Configure & Build
            command: |
              mkdir -p build-clang
              cd build-clang
              cmake ../engine/synthorbis-engine \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=clang-18 \
                -DCMAKE_CXX_COMPILER=clang++-18 \
                -DSYNTHORBIS_PREFER_SYSTEM_RIME=ON
              ninja -j$(nproc)

          - name: Upload Artifact
            command: |
              cd build-clang
              tar -czf ../synthorbis-engine-$GITORIS_COMMIT_SHA-linux-x64-clang.tar.gz .
              # Gitee Go 自动保存 build-clang/ 目录产物

  # ── Windows 构建 ────────────────────────────────────
  - stage: build_windows
    name: Windows 构建
    jobs:
      - job: build_windows_x64
        name: Windows x64 MSVC
        runner: gitee-runner:windows-2022
        steps:
          - name: Checkout
            command: |
              cd $GITORIS_REPO_LOCAL_DIR

          - name: Install librime via vcpkg
            command: |
              git clone --depth 1 https://gitee.com/mirrors/vcpkg.git $env:TEMP\vcpkg
              $env:VCPKG_ROOT = "$env:TEMP\vcpkg"
              & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
              & "$env:VCPKG_ROOT\vcpkg.exe" install librime:x64-windows boost:x64-windows yaml-cpp:x64-windows

          - name: Configure CMake
            command: |
              $env:VCPKG_ROOT = "$env:TEMP\vcpkg"
              New-Item -ItemType Directory -Force -Path build | Out-Null
              Set-Location build
              cmake ../engine/synthorbis-engine `
                -G "Visual Studio 17 2022" `
                -A x64 `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

          - name: Build
            command: |
              Set-Location build
              cmake --build . --config Release --parallel

          - name: Run Tests
            command: |
              Set-Location build
              ctest -C Release --output-on-failure -j4 || true

          - name: Upload Artifact
            command: |
              Compress-Archive -Path build\* -DestinationPath synthorbis-engine-$GITORIS_COMMIT_SHA-windows-x64.zip -Force
              # Gitee Go 自动保存 build/ 目录产物

  # ── macOS 构建 ──────────────────────────────────────
  - stage: build_macos
    name: macOS 构建
    jobs:
      - job: build_macos_universal
        name: macOS Universal
        runner: gitee-runner:macos-14
        steps:
          - name: Checkout
            command: |
              cd $GITORIS_REPO_LOCAL_DIR

          - name: Install Dependencies
            command: |
              brew install cmake ninja boost librime yaml-cpp googletest marisa-trie

          - name: Configure & Build
            command: |
              mkdir -p build
              cd build
              cmake ../engine/synthorbis-engine \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
                -DSYNTHORBIS_PREFER_SYSTEM_RIME=ON
              ninja -j$(sysctl -n hw.ncpu)

          - name: Upload Artifact
            command: |
              cd build
              tar -czf ../synthorbis-engine-$GITORIS_COMMIT_SHA-macos-universal.tar.gz .
              # Gitee Go 自动保存 build/ 目录产物

# ── 缓存配置 ─────────────────────────────────────────
cache:
  paths:
    - ~/.ccache
    - build/**/CMakeCache.txt
    - build/**/CMakeFiles

# ── 超时设置 ─────────────────────────────────────────
timeout:
  build: 60   # minutes
  test: 30    # minutes
